name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # Runs every day at 3:00 AM UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=phowdecayed&show_icons=true&theme=dark&bg_color=00000000&hide_border=true&title_color=1E1E1E&icon_color=1E1E1E&text_color=555555
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg || true
          git commit -m "chore: update profile stats cards" || exit 0
          git push
